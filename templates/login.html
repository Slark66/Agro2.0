{% extends "base.html" %}
{% block title %}Login - AgriSense AI{% endblock %}
{% block content %}
<section class="auth-layout">
    <div>
        <p class="eyebrow">Secure access</p>
        <h1>Login to your dashboard</h1>
        <p>Generate crop recommendations, reuse field history, and download farmer-ready reports.</p>
    </div>
    <form class="form-card" method="post">
        <label>Email
            <input type="email" name="email" placeholder="farmer@example.com" required>
        </label>
        <label>Password
            <input type="password" name="password" placeholder="Your password" required>
        </label>
        <button class="button full" type="submit">Login</button>
        <p class="form-note">New to the project? <a href="{{ url_for('register') }}">Create an account</a>.</p>
    </form>
</section>
{% endblock %}
